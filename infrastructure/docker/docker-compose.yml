version: '3.9'

services:
  # PostgreSQL with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: umis_db
    environment:
      POSTGRES_DB: ${DB_NAME:-university_mis}
      POSTGRES_USER: ${DB_USER:-umis_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-umis_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-umis_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umis_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: umis_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - umis_network

  # Django application
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: umis_web
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_NAME=university_mis
      - DB_USER=umis_user
      - DB_PASSWORD=umis_pass
      - REDIS_URL=redis://redis:6379/0
    networks:
      - umis_network

  # Celery worker
  celery:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: umis_celery
    command: celery -A config.celery worker -l INFO -Q default,payments,jamb,notifications,documents,ml,infra
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_NAME=university_mis
      - DB_USER=umis_user
      - DB_PASSWORD=umis_pass
      - REDIS_URL=redis://redis:6379/0
    networks:
      - umis_network

  # Celery Beat scheduler
  celery-beat:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: umis_celery_beat
    command: celery -A config.celery beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_NAME=university_mis
      - DB_USER=umis_user
      - DB_PASSWORD=umis_pass
      - REDIS_URL=redis://redis:6379/0
    networks:
      - umis_network

  # Flower for Celery monitoring
  flower:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: umis_flower
    command: celery -A config.celery flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - umis_network

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: umis_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - umis_network

  # Ollama for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: umis_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - umis_network

  # MLflow for ML model tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: umis_mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://${DB_USER}:${DB_PASSWORD}@db/${MLFLOW_DB_NAME:-mlflow} --default-artifact-root s3://${MINIO_BUCKET_NAME:-umis-files}/mlflow
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      - MLFLOW_DB_NAME=mlflow
      - MINIO_BUCKET_NAME=umis-files
    networks:
      - umis_network

  # PgAdmin for database management (dev only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: umis_pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@umis.local
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - umis_network

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  pgadmin_data:

networks:
  umis_network:
    driver: bridge